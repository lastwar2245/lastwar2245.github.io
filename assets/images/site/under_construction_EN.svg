<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">English version under construction</title>
  <desc id="desc">Orange construction banner indicating that the English version is being prepared.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#fb923c" stop-opacity="0.28"/>
    </linearGradient>
    <pattern id="stripes" width="96" height="96" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="48" height="96" fill="#fb923c"/>
      <rect x="48" width="48" height="96" fill="#111827"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="990" cy="105" r="260" fill="#22d3ee" opacity="0.12"/>
  <circle cx="185" cy="580" r="250" fill="#fb923c" opacity="0.12"/>
  <rect x="70" y="62" width="1060" height="551" rx="42" fill="url(#glow)" stroke="#334155" stroke-width="3"/>
  <g filter="url(#shadow)">
    <rect x="166" y="126" width="868" height="116" rx="18" fill="url(#stripes)" stroke="#fbbf24" stroke-width="5"/>
    <rect x="204" y="156" width="792" height="56" rx="10" fill="#020617" opacity="0.68"/>
    <text x="600" y="196" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="900" fill="#f8fafc" letter-spacing="2">EN VERSION UNDER CONSTRUCTION</text>
  </g>
  <g transform="translate(0,8)">
    <text x="600" y="338" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="84" font-weight="900" fill="#f8fafc">🚧 EN 🚧</text>
    <text x="600" y="404" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="35" font-weight="800" fill="#e5e7eb">Draft structure ready</text>
    <text x="600" y="452" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="27" fill="#cbd5e1">The French guide is the reference version.</text>
    <text x="600" y="492" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="27" fill="#cbd5e1">English translation will be added step by step.</text>
  </g>
  <g>
    <rect x="362" y="536" width="476" height="58" rx="29" fill="#162033" stroke="#22d3ee" stroke-opacity="0.58" stroke-width="3"/>
    <text x="600" y="575" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="900" fill="#fff7ed">Click to open the EN draft</text>
  </g>
</svg>
