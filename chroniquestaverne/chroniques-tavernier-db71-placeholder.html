<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chroniques du Tavernier DB71 — En construction</title>
  <style>
    :root{--bg:#050b14;--panel:#0f172a;--cyan:#22d3ee;--orange:#fb923c;--text:#f8fafc;--muted:#cbd5e1}
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{display:grid;place-items:center;background:radial-gradient(circle at 85% 10%,rgba(34,211,238,.16),transparent 34%),var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;padding:18px}
    .wrap{width:min(100%,1100px);text-align:center}
    img{display:block;width:100%;height:auto;max-height:78vh;object-fit:contain;border-radius:22px;border:1px solid rgba(34,211,238,.28);box-shadow:0 24px 80px rgba(0,0,0,.45)}
    .caption{margin:14px auto 0;color:var(--muted);font-weight:700}
    .caption strong{color:var(--orange)}
  </style>
</head>
<body>
  <main class="wrap">
    <img src="../assets/images/site/chroniques_tavernier_DB71_construction.svg" alt="Chroniques du Tavernier DB71 — en construction">
    <p class="caption"><strong>DB71</strong> prépare les chroniques. Revenez bientôt à la taverne. 🍻</p>
  </main>
</body>
</html>
